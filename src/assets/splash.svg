<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="splash_bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0f1a"/>
      <stop offset="100%" style="stop-color:#1a1a2e"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d2d3"/>
      <stop offset="100%" style="stop-color:#54a0ff"/>
    </linearGradient>
  </defs>
  <!-- Full background -->
  <rect width="512" height="512" fill="url(#splash_bg)"/>
  <!-- Document icon (centered, smaller) -->
  <path d="M206 140 h72 l44 44 v176 a12 12 0 0 1 -12 12 H206 a12 12 0 0 1 -12 -12 V152 a12 12 0 0 1 12 -12z" fill="#16213e" stroke="#2a2a4a" stroke-width="2"/>
  <path d="M278 140 v32 a12 12 0 0 0 12 12 h32z" fill="#1e2a4a"/>
  <!-- Shield -->
  <path d="M256 190 l42 14 v36 c0 28 -18 50 -42 60 c-24 -10 -42 -32 -42 -60 v-36 z" fill="none" stroke="url(#glow)" stroke-width="4" stroke-linejoin="round"/>
  <!-- Check -->
  <polyline points="240,246 252,258 272,232" fill="none" stroke="#00d2d3" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- App name -->
  <text x="256" y="420" text-anchor="middle" font-family="Arial, sans-serif" font-size="32" font-weight="bold" fill="#ffffff">DocTracker</text>
  <text x="256" y="450" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#8a8aa0">Document Expiry Manager</text>
</svg>
